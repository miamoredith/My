<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Si dudas 💗 Edith</title>

<style>
body{
    margin:0;
    font-family: Arial;
    background: radial-gradient(circle at top, #050514, #0b0b2a, #000);
    overflow:hidden;
    color:white;
}

/* 🌟 estrellas */
.star{
    position:fixed;
    width:2px;
    height:2px;
    background:white;
    border-radius:50%;
    opacity:0.5;
    animation: twinkle 4s infinite ease-in-out;
}

@keyframes twinkle{
    0%,100%{opacity:0.2;}
    50%{opacity:1;}
}

/* ✨ partículas */
.particle{
    position:fixed;
    width:3px;
    height:3px;
    background:rgba(255,255,255,0.6);
    border-radius:50%;
    pointer-events:none;
    animation: floatParticle 8s linear infinite;
}

@keyframes floatParticle{
    0%{transform:translateY(100vh);opacity:0;}
    20%{opacity:0.8;}
    100%{transform:translateY(-10vh);opacity:0;}
}

/* 🌌 panel */
.panel{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    width:85%;
    max-width:650px;
    background:rgba(255,255,255,0.08);
    backdrop-filter: blur(12px);
    border-radius:20px;
    padding:25px;
    text-align:center;
    box-shadow:0 0 25px rgba(255,192,203,0.25);
}

/* 💬 texto */
#text{
    font-size:18px;
    min-height:90px;
    margin-bottom:20px;
    color:#ffffffee;
    line-height:1.5;
}

/* 🌸 botón */
button{
    background:#ff7ac8;
    border:none;
    padding:12px 18px;
    border-radius:12px;
    color:white;
    font-size:15px;
    cursor:pointer;
}

/* 🌸 título */
h1{
    text-align:center;
    margin-top:10px;
    font-size:22px;
    color:#ffd6f3;
    text-shadow:0 0 15px #ff7ac8;
}

/* 🌌 MENU BOTÓN */
.menu-btn{
    position:fixed;
    top:15px;
    right:15px;
    padding:10px 16px;
    border-radius:10px;
    background:rgba(255,255,255,0.12);
    border:1px solid rgba(255,255,255,0.25);
    backdrop-filter: blur(10px);
    color:white;
    font-size:14px;
    cursor:pointer;
    z-index:999;
}

/* 📋 MENU */
.menu{
    position:fixed;
    top:60px;
    right:15px;
    display:flex;
    flex-direction:column;
    gap:10px;
    z-index:999;

    opacity:0;
    transform: translateY(-10px);
    pointer-events:none;
    transition:0.3s ease;
}

.menu.show{
    opacity:1;
    transform: translateY(0);
    pointer-events:auto;
}

.menu a{
    text-decoration:none;
}

.menu a div{
    color:white;
    padding:10px 14px;
    border-radius:12px;
    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.15);
    backdrop-filter: blur(10px);
    font-size:14px;
    text-align:center;
}
</style>
</head>

<body>

<!-- 🌌 MENÚ -->
<button class="menu-btn" onclick="toggleMenu()">☰ Menú</button>

<div class="menu" id="menu">
    <a href="home.html"><div>🌸 Inicio</div></a>
    <a href="galeria.html"><div>📸 Galería</div></a>
    <a href="razones.html"><div>❤️ Razones</div></a>
    <a href="musica.html"><div>🎵 Música</div></a>
    <a href="triste.html"><div>🫂 Triste</div></a>
    <a href="dudas.html"><div>🌟 Dudas</div></a>
    <a href="nuestro universo.html"><div>🌌 Nuestro universo</div></a>
    <a href="jaretbot.html"><div>🤖 JaretBot</div></a>
    <a href="minijuegos.html"><div>🎮 Juegos</div></a>
    <a href="final.html"><div>💖 Final</div></a>
</div>

<h1>💗 Si algún día dudas</h1>

<div class="panel">
    <div id="text">Te admiro por lo fuerte y persistente que eres 💗</div>
    <button onclick="next()">Siguiente 💗</button>
</div>

<script>

/* 🌌 MENU */
function toggleMenu(){
    document.getElementById("menu").classList.toggle("show");
}

/* 🌟 estrellas */
for(let i=0;i<140;i++){
    let s=document.createElement("div");
    s.className="star";
    s.style.top=Math.random()*100+"vh";
    s.style.left=Math.random()*100+"vw";
    document.body.appendChild(s);
}

/* ✨ partículas */
for(let i=0;i<40;i++){
    let p=document.createElement("div");
    p.className="particle";
    p.style.top=Math.random()*100+"vh";
    p.style.left=Math.random()*100+"vw";
    document.body.appendChild(p);
}

/* 💗 frases */
const messages = [
"Te admiro por lo fuerte y persistente que eres, confío en ti y tienes todo mi apoyo y amor 💗",
"Todo estará bien mi amor, confía en mí, yo estaré siempre para ti 💗",
"Eres una niña hermosa 💗",
"Tienes los ojos más hermosos del mundo 💗",
"Tienes una sonrisa preciosa 💗",
"Recuerda que nos vamos a casar 💗",
"Tenemos que vivir juntos 💗",
"Jamás olvidaré nuestro primer beso 💗"
];

let i = 0;
const text = document.getElementById("text");

function next(){
    i++;
    if(i < messages.length){
        text.innerText = messages[i];
    }else{
        text.innerHTML = "💗 Siempre voy a estar contigo, pase lo que pase 💗";
    }
}

</script>

</body>
</html>
