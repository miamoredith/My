<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galería 💗 Edith</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: radial-gradient(circle at top, #1a1a40, #0b0b1f);
    color: white;
    overflow-x: hidden;
}

/* 🌌 estrellas (IGUAL UNIVERSO) */
.star {
    position: fixed;
    width: 2px;
    height: 2px;
    background: white;
    border-radius: 50%;
    opacity: 0.8;
    animation: blink 2.5s infinite;
}

@keyframes blink {
    0%,100% { opacity: 0.2; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.6); }
}

/* 🌌 MENÚ */
.menu-btn {
    position: absolute;
    top: 15px;
    right: 15px;
    padding: 10px 15px;
    border-radius: 12px;
    border: none;
    background: rgba(255,255,255,0.1);
    color: white;
    cursor: pointer;
    backdrop-filter: blur(10px);
    z-index: 10;
}

.menu {
    position: absolute;
    top: 60px;
    right: 15px;
    display: none;
    flex-direction: column;
    gap: 10px;
    z-index: 10;
}

.menu a { text-decoration: none; }

.menu div {
    width: 180px;
    padding: 12px;
    border-radius: 15px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.2);
    color: white;
    text-align: center;
    backdrop-filter: blur(10px);
}

/* 💗 título */
h1 {
    text-align: center;
    margin-top: 70px;
    color: #ffd6f3;
    text-shadow: 0 0 12px #ff7ac8;
}

/* 📸 grid */
.galeria {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 18px;
    padding: 25px;
    max-width: 1200px;
    margin: auto;
}

/* 💗 card */
.card {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 18px;
    padding: 10px;
    backdrop-filter: blur(10px);
    transition: 0.3s;
    cursor: pointer;
}

.card:hover {
    transform: scale(1.05);
    box-shadow: 0 0 20px rgba(255,192,203,0.4);
}

.card img {
    width: 100%;
    height: 170px;
    object-fit: cover;
    border-radius: 14px;
}

.card p {
    font-size: 13px;
    margin-top: 8px;
    color: #ffffffcc;
    line-height: 1.4;
}

/* 🌌 modal */
.modal {
    display: none;
    position: fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background: rgba(0,0,0,0.92);
    justify-content: center;
    align-items: center;
    z-index: 20;
}

.modal img {
    max-width: 90%;
    max-height: 80%;
    border-radius: 20px;
}
</style>
</head>

<body>

<!-- 🌌 estrellas -->
<script>
for (let i = 0; i < 120; i++) {
    let star = document.createElement("div");
    star.className = "star";
    star.style.top = Math.random() * 100 + "vh";
    star.style.left = Math.random() * 100 + "vw";
    document.body.appendChild(star);
}
</script>

<!-- 🌌 BOTÓN MENÚ -->
