<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para Edith 💗</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: radial-gradient(circle at top, #050514, #0b0b2a, #000);
    overflow: hidden;
    color: white;
}

/* 🌟 ESTRELLAS */
.star{
    position:fixed;
    width:2px;
    height:2px;
    background:white;
    border-radius:50%;
    opacity:0.8;
    animation: twinkle 3s infinite ease-in-out;
}

@keyframes twinkle{
    0%,100%{opacity:0.2;}
    50%{opacity:1;}
}

/* ✨ PARTÍCULAS */
.particle{
    position:fixed;
    width:3px;
    height:3px;
    background:rgba(255,255,255,0.6);
    border-radius:50%;
    animation: float 7s linear infinite;
}

@keyframes float{
    0%{transform:translateY(100vh);opacity:0;}
    20%{opacity:0.8;}
    100%{transform:translateY(-10vh);opacity:0;}
}

/* 💗 ENTRADA */
#entrada{
    position:fixed;
    width:100%;
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
}

/* 💗 CORAZÓN */
.corazon{
    font-size:120px;
    cursor:pointer;
    animation: latido 1.2s infinite;
    text-shadow:0 0 25px #ff7ac8;
}

@keyframes latido{
    0%,100%{transform:scale(1);}
    50%{transform:scale(1.2);}
}

p{
    opacity:0.85;
}
</style>
</head>

<body>

<!-- 🌌 ESTRELLAS -->
<script>
for(let i=0;i<150;i++){
    let s=document.createElement("div");
    s.className="star";
    s.style.top=Math.random()*100+"vh";
    s.style.left=Math.random()*100+"vw";
    document.body.appendChild(s);
}

for(let i=0;i<40;i++){
    let p=document.createElement("div");
    p.className="particle";
    p.style.top=Math.random()*100+"vh";
    p.style.left=Math.random()*100+"vw";
    document.body.appendChild(p);
}
</script>

<!-- 💗 ENTRADA -->
<div id="entrada">
    <div class="corazon" onclick="entrar()">💗</div>
    <p>Toca el corazón para entrar al universo</p>
</div>

<script>

/* 🚀 LINK A PÁGINA PRINCIPAL */
function entrar(){
    window.location.href = "home.html"; 
    // 💡 CAMBIA "index.html" POR TU ARCHIVO PRINCIPAL SI SE LLAMA DISTINTO
}

</script>

</body>
</html>
